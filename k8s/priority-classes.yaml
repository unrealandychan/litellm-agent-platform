# PriorityClasses for the agent platform.
#
# Priority ladder (highest → lowest):
#   platform-critical (2 000 000) — web + worker Deployments
#   sandbox-active        (1 000) — active session pods (real user traffic)
#   sandbox-warm            (100) — warm pool pods (idle, evicted first)
#
# Effect: when the cluster is under memory pressure the scheduler evicts
# sandbox-warm pods first, then sandbox-active pods, and never evicts the
# platform itself. Without this, the default priority (0) on the platform
# Deployments is lower than sandbox-active (1 000), so Kubernetes would
# preempt the web pod to make room for a new sandbox — causing exactly the
# kind of outage where new sessions still create but the API itself goes down.
#
# Apply once per cluster:
#   kubectl apply -f k8s/priority-classes.yaml
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: platform-critical
value: 2000000
globalDefault: false
description: "Platform web + worker — never preempted by sandbox pods."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: sandbox-active
value: 1000
globalDefault: false
description: "Active session sandbox pods — preempt warm pods under pressure."
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: sandbox-warm
value: 100
globalDefault: false
description: "Warm pool sandbox pods — low priority, evicted first under pressure."
