# Web Deployment and LoadBalancer Service for litellm-agent-platform.
#
# Image tag substitution: GitHub Actions replaces the three placeholder
# variables (AWS_ACCOUNT_ID, AWS_REGION, GIT_SHA) before kubectl apply.
#
# Secret references: sensitive values are read from the `litellm-env`
# Secret (see secrets.yaml). Non-sensitive values are inlined as literals.
#
# IN_CLUSTER=true / KUBECONFIG="" — instructs src/server/k8s.ts to use
# the pod's mounted ServiceAccount token instead of a kubeconfig file.
# KUBE_CONFIG_B64 is still wired from the Secret so the value is present
# in the environment (env.ts validates it); the empty KUBECONFIG takes
# precedence at the client-node level.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm-web
  namespace: default
  labels:
    app: litellm-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: litellm-web
  template:
    metadata:
      labels:
        app: litellm-web
    spec:
      serviceAccountName: litellm-platform
      priorityClassName: platform-critical

      containers:
        - name: web
          # Substituted by GitHub Actions:
          #   envsubst '${AWS_ACCOUNT_ID} ${AWS_REGION} ${GIT_SHA}'
          image: 888602223428.dkr.ecr.us-east-1.amazonaws.com/litellm-agent-platform:${GIT_SHA}
          imagePullPolicy: IfNotPresent

          # Run migrations then start the server.
          # IN_CLUSTER=true: server-proxy.mjs listens on PORT and spawns
          # Next.js on NEXT_PORT (3001). The proxy intercepts WS upgrades for
          # /api/v1/managed_agents/sessions/*/tty and pipes them to the
          # cluster-internal sandbox pod; all other traffic goes to Next.js.
          command: ["/bin/sh", "-c"]
          args:
            # Skip prisma migrate deploy — Neon pooler connection uses transaction
            # mode which doesn't support pg_advisory_lock. Run migrations separately
            # using the direct (non-pooler) connection URL before deploying.
            - "node server-proxy.mjs"

          ports:
            - containerPort: 10000
              name: http

          # ── Secrets (from litellm-env Secret) ──────────────────────────
          env:
            - name: MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: MASTER_KEY

            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: DATABASE_URL

            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: LITELLM_API_KEY

            - name: KUBE_CONFIG_B64
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: KUBE_CONFIG_B64
                  optional: true   # not needed when IN_CLUSTER=true

            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: AWS_ACCESS_KEY_ID
                  optional: true   # only required for EKS exec-plugin auth

            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: AWS_SECRET_ACCESS_KEY
                  optional: true

            # ── Non-secret literals ──────────────────────────────────────
            - name: NODE_ENV
              value: "production"

            - name: PORT
              value: "10000"

            - name: UI_USERNAME
              value: "admin"

            - name: LITELLM_API_BASE
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: LITELLM_API_BASE

            - name: LITELLM_DEFAULT_MODEL
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: LITELLM_DEFAULT_MODEL

            - name: PREINSTALLED_GITHUB_REPO
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: PREINSTALLED_GITHUB_REPO

            - name: AWS_REGION
              value: "us-east-1"

            - name: K8S_NODE_HOST
              value: "auto"

            - name: K8S_HARNESS_IMAGE
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: K8S_HARNESS_IMAGE

            - name: K8S_HARNESS_IMAGE_HERMES
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: K8S_HARNESS_IMAGE_HERMES
                  optional: true

            - name: K8S_NAMESPACE
              value: "default"

            - name: K8S_NODEPORT_MIN
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: K8S_NODEPORT_MIN

            - name: K8S_NODEPORT_MAX
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: K8S_NODEPORT_MAX

            - name: K8S_IMAGE_PULL_POLICY
              value: "IfNotPresent"

            - name: WARM_POOL_SIZE
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: WARM_POOL_SIZE

            # Force in-cluster auth; disable file-based kubeconfig.
            - name: IN_CLUSTER
              value: "true"

            - name: KUBECONFIG
              value: ""

            # Override Kubernetes' automatic HOSTNAME injection (pod name).
            # server-proxy.mjs uses BIND_HOST for listen(), not HOSTNAME, but
            # this explicit override prevents any accidental HOSTNAME reads from
            # resolving to the pod name instead of a bindable address.
            - name: HOSTNAME
              value: "0.0.0.0"

            # Harness auth token: passed to sandbox pods as HARNESS_AUTH_TOKEN
            # (via containerEnvPassthrough) and returned to browsers as tty_token
            # so they can authenticate against the /tty WebSocket.
            - name: CONTAINER_ENV_HARNESS_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: litellm-env
                  key: CONTAINER_ENV_HARNESS_AUTH_TOKEN

          # Simple TCP liveness — avoids needing auth headers in the probe.
          livenessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3

          readinessProbe:
            tcpSocket:
              port: 10000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3

          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

---
# Internet-facing LoadBalancer (AWS ALB controller annotation).
# Remove the annotation and switch to ClusterIP + Ingress if you use
# an Ingress controller instead.
apiVersion: v1
kind: Service
metadata:
  name: litellm-web
  namespace: default
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    # WebSocket traffic to /tty often pauses for >60s (the AWS ELB default
    # idle timeout) while the model thinks or the user reads a permission
    # prompt. Without this annotation the ELB silently drops the connection
    # and the lap CLI prints "[connection closed]" the moment the user
    # presses a key. 3600s (1h) matches what a long agentic session looks
    # like in practice; lap CLI also sends WS pings every 30s as a second
    # line of defense (see cli/bin/lap.mjs).
    service.beta.kubernetes.io/aws-load-balancer-connection-idle-timeout: "3600"
spec:
  type: LoadBalancer
  selector:
    app: litellm-web
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 10000
