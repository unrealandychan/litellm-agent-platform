# Deploy to Amazon EKS on every push to main.
#
# ── Required GitHub Secrets ────────────────────────────────────────────────────
#
#   AWS_ROLE_ARN       ARN of the IAM role GitHub Actions will assume via OIDC.
#                      Example: arn:aws:iam::123456789012:role/github-actions-deploy
#                      The role needs:
#                        • ecr:GetAuthorizationToken (on *)
#                        • ecr:BatchCheckLayerAvailability, ecr:PutImage,
#                          ecr:InitiateLayerUpload, ecr:UploadLayerPart,
#                          ecr:CompleteLayerUpload
#                          (on arn:aws:ecr:<region>:<account>:repository/litellm-agent-platform)
#                        • eks:DescribeCluster (for update-kubeconfig)
#                        • The EKS cluster's aws-auth ConfigMap must grant
#                          the role kubectl RBAC (system:masters or a
#                          scoped role with get/patch on deployments).
#
#   AWS_ACCOUNT_ID     12-digit AWS account number. Example: 123456789012
#
#   AWS_REGION         AWS region where ECR and EKS live. Example: us-east-1
#
#   EKS_CLUSTER_NAME   Name of the EKS cluster. Example: litellm-agents
#
#   MASTER_KEY         Platform master key. Smoke test uses it to verify TTY
#                      auth passes after every deploy.
#
# Secret placement:
#   build-push job has no environment gate, so it can only read REPO secrets.
#   deploy job references `environment: production` and reads ENVIRONMENT secrets.
#
#   Keep as REPO secrets (build-push needs them for ECR auth):
#     AWS_ROLE_ARN, AWS_ACCOUNT_ID, AWS_REGION
#
#   Set as ENVIRONMENT secrets (Settings → Environments → production → Secrets):
#     EKS_CLUSTER_NAME, MASTER_KEY
#   (Duplicating AWS_ROLE_ARN / AWS_ACCOUNT_ID / AWS_REGION there is fine too —
#    environment secrets take precedence for the deploy job.)
#
# ── Required GitHub Variables (Settings → Environments → production → Variables)
#
#   ALB_URL            Public base URL of the platform ALB.
#                      Example: http://abc123-1234.us-east-1.elb.amazonaws.com
#
# ── One-time IAM / OIDC Setup (run once per AWS account) ──────────────────────
#
#   1. Create an OIDC identity provider in IAM for GitHub Actions:
#        Provider URL : https://token.actions.githubusercontent.com
#        Audience     : sts.amazonaws.com
#      AWS Console → IAM → Identity providers → Add provider
#      (or: aws iam create-open-id-connect-provider)
#
#   2. Create an IAM role with the trust policy below, then attach the
#      permissions listed under AWS_ROLE_ARN above.
#
#      Trust policy (replace ORG/REPO as needed):
#      {
#        "Version": "2012-10-17",
#        "Statement": [{
#          "Effect": "Allow",
#          "Principal": {
#            "Federated": "arn:aws:iam::<ACCOUNT_ID>:oidc-provider/token.actions.githubusercontent.com"
#          },
#          "Action": "sts:AssumeRoleWithWebIdentity",
#          "Condition": {
#            "StringEquals": {
#              "token.actions.githubusercontent.com:aud": "sts.amazonaws.com"
#            },
#            "StringLike": {
#              "token.actions.githubusercontent.com:sub": "repo:<ORG>/<REPO>:ref:refs/heads/main"
#            }
#          }
#        }]
#      }
#
#   3. Grant the role kubectl access by editing the EKS aws-auth ConfigMap:
#        kubectl edit configmap aws-auth -n kube-system
#      Add under mapRoles:
#        - rolearn: <AWS_ROLE_ARN>
#          username: github-actions
#          groups:
#            - system:masters   # or a least-privilege group
#
# ──────────────────────────────────────────────────────────────────────────────

name: Deploy to EKS

on:
  push:
    branches: [main]

# Minimal top-level permissions; each job declares only what it needs.
permissions: {}

jobs:

  # ── Job 1: Build the Docker image and push it to ECR ───────────────────────
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Required by aws-actions/configure-aws-credentials OIDC token exchange.
      id-token: write

    outputs:
      # Propagate image URIs to the deploy job.
      image: ${{ steps.image-tag.outputs.image }}
      claude_code_image: ${{ steps.harness-claude-code.outputs.image }}
      claude_sdk_image: ${{ steps.harness-claude-sdk.outputs.image }}
      opencode_image: ${{ steps.harness-opencode.outputs.image }}
      codex_image: ${{ steps.harness-codex.outputs.image }}
      hermes_image: ${{ steps.harness-hermes.outputs.image }}
      gemini_image: ${{ steps.harness-gemini.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          # Mask the account ID in logs for defense-in-depth.
          mask-aws-account-id: true

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: image-tag
        # ECR registry URL is emitted by the login step; we append the repo
        # name and pin to the commit SHA for reproducibility.
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:${{ github.sha }}"
          echo "IMAGE=$IMAGE" >> "$GITHUB_ENV"
          # Also surface it as a step output so the deploy job can consume it.
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: docker build -t "$IMAGE" .

      - name: Push image (SHA tag)
        run: docker push "$IMAGE"

      - name: Tag and push image (latest)
        run: |
          LATEST="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:latest"
          docker tag "$IMAGE" "$LATEST"
          docker push "$LATEST"

      - name: Build & push claude-code harness
        id: harness-claude-code
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:harness-claude-code-${{ github.sha }}"
          docker buildx build -f harnesses/claude-code/Dockerfile -t "$IMG" .
          docker push "$IMG"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Build & push claude-agent-sdk harness
        id: harness-claude-sdk
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:harness-claude-sdk-${{ github.sha }}"
          docker buildx build -f harnesses/claude-agent-sdk/Dockerfile -t "$IMG" .
          docker push "$IMG"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Build & push opencode harness
        id: harness-opencode
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:harness-opencode-${{ github.sha }}"
          docker buildx build -f harnesses/opencode/Dockerfile -t "$IMG" .
          docker push "$IMG"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Build & push codex harness
        id: harness-codex
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:harness-codex-${{ github.sha }}"
          docker buildx build -f harnesses/codex/Dockerfile -t "$IMG" .
          docker push "$IMG"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Build & push hermes harness
        id: harness-hermes
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:harness-hermes-${{ github.sha }}"
          docker buildx build -f harnesses/hermes/Dockerfile -t "$IMG" .
          docker push "$IMG"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Build & push gemini harness
        id: harness-gemini
        run: |
          IMG="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:harness-gemini-${{ github.sha }}"
          docker buildx build -f harnesses/gemini/Dockerfile -t "$IMG" .
          docker push "$IMG"
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

  # ── Job 2: Roll out the new image to EKS deployments ──────────────────────
  deploy:
    name: Deploy to EKS
    needs: build-push
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          mask-aws-account-id: true

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name "${{ secrets.EKS_CLUSTER_NAME }}" \
            --region "${{ secrets.AWS_REGION }}"

      - name: Update harness images in litellm-env secret
        # GitHub Actions masks step outputs whose values contain a secret
        # (here AWS_ACCOUNT_ID), and the masked value silently resolves to
        # empty when consumed via `needs.build-push.outputs.*`. The earlier
        # version of this step did exactly that and patched the secret with
        # empty strings, so every claude-code session create then failed with
        # `spec.containers[0].image: Required value`. Construct the URIs
        # inline (same way the deployment-image step does) so the secrets
        # are interpolated by bash at run time, never crossing a step output.
        env:
          REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform
          SHA: ${{ github.sha }}
        run: |
          CC="${REGISTRY}:harness-claude-code-${SHA}"
          SDK="${REGISTRY}:harness-claude-sdk-${SHA}"
          OC="${REGISTRY}:harness-opencode-${SHA}"
          CX="${REGISTRY}:harness-codex-${SHA}"
          HM="${REGISTRY}:harness-hermes-${SHA}"
          GM="${REGISTRY}:harness-gemini-${SHA}"
          CC_B64=$(printf '%s' "$CC" | base64 | tr -d '\n')
          SDK_B64=$(printf '%s' "$SDK" | base64 | tr -d '\n')
          OC_B64=$(printf '%s' "$OC" | base64 | tr -d '\n')
          CX_B64=$(printf '%s' "$CX" | base64 | tr -d '\n')
          HM_B64=$(printf '%s' "$HM" | base64 | tr -d '\n')
          GM_B64=$(printf '%s' "$GM" | base64 | tr -d '\n')
          # JSON Patch `add` both creates and overwrites (RFC 6902 §4.1).
          # `replace` would fail with "object not found" on the first deploy
          # that introduces a new harness key (e.g. CODEX/HERMES) before the
          # secret has it.
          kubectl patch secret litellm-env -n default --type=json -p="[
            {\"op\":\"add\",\"path\":\"/data/K8S_HARNESS_IMAGE_CLAUDE_CODE\",\"value\":\"$CC_B64\"},
            {\"op\":\"add\",\"path\":\"/data/K8S_HARNESS_IMAGE_CLAUDE_SDK\",\"value\":\"$SDK_B64\"},
            {\"op\":\"add\",\"path\":\"/data/K8S_HARNESS_IMAGE_OPENCODE\",\"value\":\"$OC_B64\"},
            {\"op\":\"add\",\"path\":\"/data/K8S_HARNESS_IMAGE_CODEX\",\"value\":\"$CX_B64\"},
            {\"op\":\"add\",\"path\":\"/data/K8S_HARNESS_IMAGE_HERMES\",\"value\":\"$HM_B64\"},
            {\"op\":\"add\",\"path\":\"/data/K8S_HARNESS_IMAGE_GEMINI\",\"value\":\"$GM_B64\"}
          ]"

      # Apply the manifests BEFORE setting the image so env-var additions
      # (e.g. new K8S_HARNESS_IMAGE_<NAME> entries on the pod spec) reach
      # the cluster. `kubectl set image` only updates the image field —
      # any other change to the deployment template that lives only in
      # k8s/web.yaml (env mappings, volumes, etc.) never lands without
      # `kubectl apply`. The manifest's `image:` is a `${GIT_SHA}`
      # placeholder; envsubst expands it to this commit's SHA so the
      # applied template carries a valid image reference — the same SHA
      # the explicit `kubectl set image` step below pins again.
      - name: Apply RBAC + web + worker manifests
        env:
          GIT_SHA: ${{ github.sha }}
        run: |
          # RBAC has no template placeholders, apply directly. Must come
          # first so any new verb the deployment depends on is in place
          # before the rollout starts.
          kubectl apply -n default -f k8s/rbac-platform.yaml
          envsubst '$GIT_SHA' < k8s/web.yaml    | kubectl apply -n default -f -
          envsubst '$GIT_SHA' < k8s/worker.yaml | kubectl apply -n default -f -

      - name: Verify RBAC — pods/exec permission
        run: |
          # Fail the deploy if the platform ServiceAccount can't exec into
          # pods. Missing this verb causes sandbox_files injection to fail
          # silently at phase=injecting_files with failure_reason=[object Object].
          kubectl auth can-i create pods/exec \
            --namespace default \
            --as system:serviceaccount:default:litellm-platform

      - name: Update web deployment image
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:${{ github.sha }}"
          kubectl set image deployment/litellm-web \
            web="$IMAGE" \
            -n default

      - name: Update worker deployment image
        run: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/litellm-agent-platform:${{ github.sha }}"
          kubectl set image deployment/litellm-worker \
            worker="$IMAGE" \
            -n default

      - name: Wait for web rollout
        run: |
          kubectl rollout status deployment/litellm-web \
            -n default \
            --timeout=300s

      - name: Wait for worker rollout
        run: |
          kubectl rollout status deployment/litellm-worker \
            -n default \
            --timeout=300s

      - name: Smoke test — platform health + TTY auth
        env:
          MASTER_KEY: ${{ secrets.MASTER_KEY }}
          ALB_URL: ${{ vars.ALB_URL }}
        run: python3 scripts/smoke-test-deploy.py
